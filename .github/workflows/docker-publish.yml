name: Publish to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - ".github/workflows/**"
  # Use 'released' instead of 'published' so editing/re-publishing old releases
  # does NOT re-trigger this workflow. 'released' fires only on the initial
  # release publication (and pre-release → release transition).
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. 3.8.4)"
        required: true
        type: string
      promote_latest:
        description: "Also tag :latest (only if this is the highest semver)"
        required: false
        type: boolean
        default: false

# Least-privilege default: read-only at the top level; the build job that
# pushes to GHCR grants packages: write itself (Scorecard TokenPermissions).
permissions:
  contents: read

env:
  GHCR_IMAGE_NAME: ghcr.io/vinaycharlie01/omniroute

# ── Simplified for now: just build + push the base image to this fork's own
# GHCR (ghcr.io/vinaycharlie01/omniroute) on every push to main / tag / release.
# The full pipeline (versioned release gating, base+web split, multi-arch
# digest-merge, CycloneDX SBOM, Trivy CRITICAL gate) is commented out below —
# uncomment the `prepare`/`build`/`merge` jobs at the bottom to restore it.
jobs:
  build:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=omniroute
            org.opencontainers.image.description=Unified AI proxy/router — fork image
            org.opencontainers.image.url=https://github.com/vinaycharlie01/OmniRoute
            org.opencontainers.image.source=https://github.com/vinaycharlie01/OmniRoute
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

